<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#08090b;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px;}
  .cell{position:relative;}
  .cell img{width:100%;display:block;border-radius:6px;}
  .num{position:absolute;top:8px;left:8px;background:#61F0A0;color:#08090b;font:600 13px/1 Arial,sans-serif;padding:3px 7px;border-radius:4px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><img src="slide1_ig.png"><span class="num">1</span></div>
    <div class="cell"><img src="slide2_ig.png"><span class="num">2</span></div>
    <div class="cell"><img src="slide3_ig.png"><span class="num">3</span></div>
    <div class="cell"><img src="slide4_ig.png"><span class="num">4</span></div>
    <div class="cell"><img src="slide5_ig.png"><span class="num">5</span></div>
    <div class="cell"><img src="slide6_ig.png"><span class="num">6</span></div>
    <div class="cell"><img src="slide7_ig.png"><span class="num">7</span></div>
    <div class="cell"><img src="slide8_ig.png"><span class="num">8</span></div>
  </div>
</body>
</html>
