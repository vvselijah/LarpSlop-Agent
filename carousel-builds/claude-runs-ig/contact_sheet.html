<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
body{background:#141418;font-family:Inter,Arial,sans-serif}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:22px;width:1480px}
.title{grid-column:1/-1;color:#fff;font:600 26px Inter;padding:2px 2px 6px}
.cell{position:relative}
.cell img{width:100%;display:block;border-radius:10px;border:1px solid #2c2c33}
.num{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.65);color:#fff;font:600 17px Inter;padding:3px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.25)}
</style></head><body>
<div class="board">
<div class="title">Claude Runs Your Instagram &mdash; full carousel (8 slides, cinematic set)</div>
<div class="cell"><img src="slides/slide1.png"><div class="num">1</div></div>
<div class="cell"><img src="slides/slide2.png"><div class="num">2</div></div>
<div class="cell"><img src="slides/slide3.png"><div class="num">3</div></div>
<div class="cell"><img src="slides/slide4.png"><div class="num">4</div></div>
<div class="cell"><img src="slides/slide5.png"><div class="num">5</div></div>
<div class="cell"><img src="slides/slide6.png"><div class="num">6</div></div>
<div class="cell"><img src="slides/slide7.png"><div class="num">7</div></div>
<div class="cell"><img src="slides/slide8.png"><div class="num">8</div></div>
</div></body></html>
