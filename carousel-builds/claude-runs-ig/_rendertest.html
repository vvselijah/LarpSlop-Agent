<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  .slide{width:1080px;height:1350px;box-sizing:border-box;
    background:radial-gradient(120% 90% at 20% 0%, #1a1530 0%, #0a0a12 55%, #05050a 100%);
    color:#fff;font-family:'Sora',system-ui,sans-serif;
    display:flex;flex-direction:column;justify-content:center;padding:110px 96px}
  .tag{font-size:30px;letter-spacing:.32em;color:#9b8cff;font-weight:600;text-transform:uppercase}
  h1{font-size:104px;line-height:1.02;font-weight:800;margin:34px 0 0}
  .accent{color:#a78bfa}
  p{font-size:40px;color:#c9c7d6;margin-top:40px;font-weight:400}
  .emoji{font-size:60px;margin-top:30px}
</style></head>
<body><div class="slide">
  <div class="tag">render test</div>
  <h1>Claude runs your <span class="accent">entire Instagram</span> better than you.</h1>
  <p>so I open-sourced the whole project. free.</p>
  <div class="emoji">🔓📈🤯</div>
</div></body></html>
